name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  QT_VERSION: "6.7.2"

jobs:
  rust-check:
    name: Rust Format and Bridge Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Check bridge
        run: cargo check -p lithedb-bridge --locked

      - name: Run tests
        run: cargo test -p lithedb-core -p lithedb-bridge --locked

  qt-build-linux:
    name: Qt Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-wayland \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bridge
        run: cargo build -p lithedb-bridge --release --locked

      - name: Configure Qt build
        run: cmake -S apps/lithedb-qt -B build-qt -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt app
        run: cmake --build build-qt --config Release

  qt-build-windows:
    name: Qt Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          cache: true

      - name: Build bridge
        run: cargo build -p lithedb-bridge --release --locked

      - name: Configure Qt build
        run: cmake -S apps/lithedb-qt -B build-qt -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt app
        run: cmake --build build-qt --config Release

  qt-build-macos:
    name: Qt Build macOS
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: clang_64
          cache: true

      - name: Build bridge
        run: cargo build -p lithedb-bridge --release --locked

      - name: Configure Qt build
        run: cmake -S apps/lithedb-qt -B build-qt -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build Qt app
        run: cmake --build build-qt --config Release
