name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3 \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            libsecret-1-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: ./scripts/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/debian/*.deb
          if-no-files-found: error

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3 \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            libsecret-1-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build .rpm package
        run: ./scripts/build-rpm.sh

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

  build-arch:
    name: Build Arch Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            rust \
            cargo \
            gtk4 \
            libadwaita \
            gtksourceview5 \
            libsecret \
            openssl \
            pkgconf \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create non-root build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build .pkg.tar.zst package
        run: su builder -c "cd '$GITHUB_WORKSPACE' && ./scripts/build-arch.sh"

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: packaging/arch/*.pkg.tar.zst
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-rpm
      - build-arch
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.deb *.rpm *.pkg.tar.zst > SHA256SUMS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.pkg.tar.zst
            release-assets/SHA256SUMS
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          append_body: true

      - name: Note source archives
        run: |
          echo "GitHub automatically provides Source code (zip) and Source code (tar.gz) for this release tag."
