[package]
name = "table-pro-linux"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4 = "0.7"
libadwaita = { version = "0.5", features = ["v1_2"] }
sourceview5 = "0.7"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "mysql", "sqlite"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
keyring = "2"
aes-gcm = "0.10"
directories = "5"
log = "0.4"
env_logger = "0.11"

hex = "0.4"
sha2 = "0.10"
rand = "0.8"
